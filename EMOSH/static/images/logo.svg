<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="50%" style="stop-color:#EC4899"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#g)"/>
  <!-- Dancing human silhouette, larger -->
  <g transform="translate(100,130) scale(1.6)" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="0" cy="-50" r="11" fill="white" stroke="none"/>
    <!-- Spine / torso -->
    <line x1="0" y1="-39" x2="0" y2="-5"/>
    <!-- Left arm up -->
    <line x1="0" y1="-32" x2="-22" y2="-52"/>
    <line x1="-22" y1="-52" x2="-14" y2="-40"/>
    <!-- Right arm out -->
    <line x1="0" y1="-32" x2="26" y2="-44"/>
    <line x1="26" y1="-44" x2="36" y2="-28"/>
    <!-- Left leg bent -->
    <line x1="0" y1="-5" x2="-18" y2="18"/>
    <line x1="-18" y1="18" x2="-28" y2="5"/>
    <!-- Right leg standing -->
    <line x1="0" y1="-5" x2="16" y2="20"/>
    <line x1="16" y1="20" x2="20" y2="40"/>
  </g>
</svg>
